    "abstract": "<jats:p>Abstract. Leading-edge inflatable (LEI) kites are morphing aerodynamic surfaces that are actuated by the bridle line system. Their design as tensile membrane structures has several implications for the aerodynamic performance. Because of the pronounced C-shape of the wings, a considerable part of the aerodynamic forces is redirected sideways and used for steering. The inflated tubular frame introduces flow recirculation zones on the pressure side of the wing. In this paper, we present wind tunnel measurements of a 1:6.5 rigid scale model of the 25 m2 TU Delft V3 LEI kite developed specifically for airborne wind energy (AWE) harvesting. Because the real kite deforms during flight, the scale model was manufactured to match the well-defined design geometry. Aerodynamic forces and moments were recorded in an open jet wind tunnel over large ranges of angles of attack and sideslip, for five different inflow speeds. The wind tunnel measurements were performed with and without zigzag tape along the model's leading edge to investigate the possible boundary layer tripping effect of the stitching seam connecting the canopy to the inflated tube. To quantify the quality of the acquired data, the autocorrelation-consistent confidence intervals, coefficient of variation, and measurement repeatability were reported, and the effects of sensor drift and flow-induced vibrations of the test setup at the highest Reynolds number were assessed. A representative subset of the measurements was compared to Reynolds-averaged Navier-Stokes (RANS) flow simulations from literature, as well as new simulations conducted with an existing Vortex-Step Method (VSM). In conclusion, the measured aerodynamic characteristics validate both RANS and VSM simulations under nominal kite operating conditions, with both models yielding similar trends and values within a 5 to 10 % range.<\/jats:p>",
