    "abstract": "<jats:p>Abstract. Climate change leads to an increasing number of flood events that poses threats to a large share of the global population. In addition to direct effects, flooding leads to indirect effect due to damages of the road infrastructure that might limit accessibility of health sites. For disaster preparedness it is important to know how flood events impact accessibility in that respect. We analyzed this at the example of the capital of Indonesia, Jakarta based on the flood event of 2013. The analysis was based on information about the road network and health sites from OpenStreetMap. We assessed impacts of the flood event by comparing centrality indicators of the road network as well as by an accessibility analysis of health sites before and during the event. The flooded areas were home to 2.75 million inhabitants and hosted 79 clinics and hospitals. The flood split the road network into several subgraphs. The city center maintained its importance for time-efficient routing as well as for easily accessible healthcare but might be prone to traffic congestion after such an event. Indirect effects via interrupted road traffic through flooded areas affected around 1.5 million inhabitants and led to an increase of travel time to the nearest hospital by five minutes based on normal traffic conditions.  \n                    <\/jats:p>",
