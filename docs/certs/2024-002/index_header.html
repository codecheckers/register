    "abstract": "Continuously measuring the efficiency of wastewater treatment plants is crucial to progress in sanitation management. Regulations for decentralized wastewater treatment plants (WWTP) can include rudimentary specifications for sporadic sampling, unencouraging continuous monitoring, and missing crucial domestic wastewater (DW) variability, especially in low- and middle-income countries. However, few studies have focused on modeling and understanding spatiotemporal DW variability. We developed and calibrated an agent-based model (ABM) to understand spatial and temporal DW variability, its role in estimated WWTP efficiency, and provide recommendations to improve sampling regulations. We simulated DW variability at various spatial and temporal resolutions in Santa Ana Atzcapotzaltongo, Mexico, focusing on chemical oxygen demand (COD) and total suspended solids (TSS). The model results show that DW variability increases at higher spatiotemporal resolutions. Without a proper understanding of DW variability, treatment efficiency can be overestimated or underestimated by as much as 25% from sporadic sampling. Sensor measurements at 6-min intervals over 3 hours are recommended to overcome uncertainty resulting from temporal variability during heavy drinking water demand in the morning. Reporting of sewage catchment areas, population sizes, and sampling times and intervals is recommended to compare WWTP efficiencies to overcome uncertainty resulting from spatiotemporal variability. The proposed model is a useful tool for understanding DW variability. It can be used to estimate the impact of spatiotemporal variability when measuring WWTP efficiencies, support improvements to sampling regulations for decentralized sanitation, and alternatively for designing and operating WWTPs.",
